<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太阳系3D展示</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Orbitron', sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        .controls-info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .controls-info h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #FDB813;
            letter-spacing: 2px;
        }

        .controls-info p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
        }

        .planet-label {
            position: absolute;
            color: #fff;
            font-size: 10px;
            pointer-events: none;
            text-shadow: 0 0 5px #000;
            transform: translate(-50%, -50%);
            opacity: 0.8;
        }

        .speed-control {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .speed-control label {
            color: #fff;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .speed-control input[type="range"] {
            width: 150px;
            height: 4px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #FDB813, #ff6600);
            border-radius: 2px;
            outline: none;
        }

        .speed-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(253, 184, 19, 0.8);
        }

        .speed-value {
            color: #FDB813;
            font-size: 12px;
            min-width: 40px;
        }

        /* Information Panel */
        .info-panel {
            position: fixed;
            top: 20px;
            right: -320px;
            width: 300px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            color: #fff;
            backdrop-filter: blur(15px);
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 200;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .info-panel.active {
            right: 20px;
        }

        .info-panel h2 {
            font-size: 24px;
            color: #FDB813;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(253, 184, 19, 0.3);
            padding-bottom: 10px;
        }

        .info-panel .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-panel .label {
            color: #aaa;
        }

        .info-panel .value {
            font-weight: bold;
            color: #fff;
        }

        .info-panel p {
            margin-top: 15px;
            font-size: 13px;
            line-height: 1.6;
            color: #ddd;
            max-height: 300px;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #FDB813;
        }

        .reset-view-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: rgba(253, 184, 19, 0.1);
            border: 1px solid #FDB813;
            color: #FDB813;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.2s;
        }

        .reset-view-btn:hover {
            background: #FDB813;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="controls-info">
        <h3>控制说明</h3>
        <p>🖱️ 左键拖拽 - 旋转视角<br>
        🔍 滚轮 - 缩放<br>
        📍 右键拖拽 - 移动<br>
        ⏱️ 速度滑块 - 调整运行速度<br>
        👆 点击星体 - 查看详情</p>
    </div>

    <div class="info-panel" id="infoPanel">
        <button class="close-btn" onclick="closeInfoPanel()">×</button>
        <h2 id="panelTitle">行星名称</h2>
        <div class="data-row">
            <span class="label">平均半径:</span>
            <span class="value" id="panelRadius">-</span>
        </div>
        <div class="data-row">
            <span class="label">公转周期:</span>
            <span class="value" id="panelOrbit">-</span>
        </div>
        <div class="data-row">
            <span class="label">距离太阳:</span>
            <span class="value" id="panelDistance">-</span>
        </div>
        <p id="panelDesc">行星描述信息...</p>
        <button class="reset-view-btn" onclick="resetView()">返回全景</button>
    </div>

    <div class="speed-control">
        <label>运行速度</label>
        <input type="range" id="speedSlider" min="0" max="3" step="0.1" value="1">
        <span class="speed-value" id="speedValue">1.0x</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        let scene, camera, renderer, controls;
        let planets = [];
        let sun;
        let speedMultiplier = 1;
        let starField;
        
        // Raycasting & Interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isFocused = false;
        let focusedTarget = null;
        let targetCameraPosition = new THREE.Vector3();
        let targetLookAt = new THREE.Vector3();
        let isTransitioning = false;

        const planetData = [
            { 
                name: '水星', radius: 0.4, distance: 10, color: 0xA5A5A5, orbitPeriod: 8, rotationSpeed: 0.01,
                realRadius: '2,439 km', realDistance: '5790 万 km', realPeriod: '88 天',
                desc: '水星是太阳系中最小的行星，也是最接近太阳的行星。它的表面布满了陨石坑，看起来很像月球。由于没有大气层保留热量，水星的温差极大，白天可达430°C，晚上降至-180°C。'
            },
            { 
                name: '金星', radius: 0.9, distance: 15, color: 0xE6C87A, orbitPeriod: 12, rotationSpeed: 0.008,
                realRadius: '6,051 km', realDistance: '1.08 亿 km', realPeriod: '225 天',
                desc: '金星是离地球最近的行星，大小和地球相似，常被称为地球的“姐妹星”。它有浓厚的大气层，主要由二氧化碳组成，造成强烈的温室效应，使其成为太阳系中最热的行星（约465°C）。'
            },
            { 
                name: '地球', radius: 1, distance: 20, color: 0x6B93D6, orbitPeriod: 20, rotationSpeed: 0.02,
                realRadius: '6,371 km', realDistance: '1.49 亿 km', realPeriod: '365.25 天',
                desc: '地球是我们共同的家园，也是目前已知唯一存在生命的星球。地球表面71%被水覆盖，拥有适宜的大气层和磁场，保护生命免受太阳辐射的伤害。'
            },
            { 
                name: '火星', radius: 0.5, distance: 25, color: 0xC1440E, orbitPeriod: 30, rotationSpeed: 0.018,
                realRadius: '3,389 km', realDistance: '2.28 亿 km', realPeriod: '687 天',
                desc: '火星被称为“红色星球”，因其表面的氧化铁（铁锈）而呈现红色。它有太阳系最大的火山——奥林帕斯山，以及巨大的峡谷。科学家一直在寻找火星上过去或现在存在生命的证据。'
            },
            { 
                name: '木星', radius: 3, distance: 40, color: 0xD8CA9D, orbitPeriod: 60, rotationSpeed: 0.04,
                realRadius: '69,911 km', realDistance: '7.78 亿 km', realPeriod: '11.86 年',
                desc: '木星是太阳系中最大的行星，是一颗巨大的气态巨行星。它最著名的特征是“大红斑”，一个持续了数百年的巨大风暴。木星拥有众多的卫星，其中四颗伽利略卫星最为著名。'
            },
            { 
                name: '土星', radius: 2.5, distance: 55, color: 0xEAD6B8, orbitPeriod: 80, rotationSpeed: 0.038, hasRing: true,
                realRadius: '58,232 km', realDistance: '14.3 亿 km', realPeriod: '29.45 年',
                desc: '土星以其壮观的行星环系统而闻名，主要由冰块和岩石碎片组成。它也是一颗气态巨行星，密度非常低，如果有一个足够大的浴缸，土星甚至能浮在水面上。'
            },
            { 
                name: '天王星', radius: 1.5, distance: 70, color: 0xD1E7E7, orbitPeriod: 120, rotationSpeed: 0.025,
                realRadius: '25,362 km', realDistance: '28.7 亿 km', realPeriod: '84 年',
                desc: '天王星是一颗冰巨星，因大气中含有甲烷而呈现青绿色。它最独特的特征是其自转轴几乎躺在轨道面上，像是“躺着”绕太阳旋转。'
            },
            { 
                name: '海王星', radius: 1.4, distance: 85, color: 0x5B5DDF, orbitPeriod: 150, rotationSpeed: 0.022,
                realRadius: '24,622 km', realDistance: '45 亿 km', realPeriod: '164.8 年',
                desc: '海王星是太阳系最远的行星，也是一颗冰巨星，颜色深蓝。它拥有太阳系中最强烈的风暴，风速可达2100公里/小时。'
            }
        ];

        // Sun Data
        const sunData = {
            name: '太阳', radius: 5, color: 0xFDB813, 
            realRadius: '696,340 km', realDistance: '0 km', realPeriod: '-',
            desc: '太阳是太阳系的中心恒星，占太阳系总质量的99.86%。它是一个巨大的等离子体球，通过核心的核聚变反应产生巨大的能量，为地球上的生命提供光和热。'
        };

        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 80, 120);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 20;
            controls.maxDistance = 500;

            createStarField();
            createSun();
            createPlanets();
            createAmbientLight();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('click', onMouseClick, false);

            const speedSlider = document.getElementById('speedSlider');
            const speedValue = document.getElementById('speedValue');
            speedSlider.addEventListener('input', (e) => {
                speedMultiplier = parseFloat(e.target.value);
                speedValue.textContent = speedMultiplier.toFixed(1) + 'x';
            });

            animate();
        }

        function onMouseClick(event) {
            // Calculate mouse position in normalized device coordinates (-1 to +1) for both components
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Create an array of objects to check for intersections
            let objectsToCheck = [sun];
            planets.forEach(p => objectsToCheck.push(p.planet));

            const intersects = raycaster.intersectObjects(objectsToCheck);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                
                // Determine target and data
                let target = object;
                let data = null;

                if (object === sun || object.parent === sun) {
                    target = sun;
                    data = sunData;
                } else {
                    const planetObj = planets.find(p => p.planet === object);
                    if (planetObj) {
                        target = planetObj.planet;
                        data = planetObj.data;
                    }
                }
                
                if (data) {
                    focusOnObject(target, data);
                }
            }
        }

        function focusOnObject(object, data) {
            isFocused = true;
            focusedTarget = object;
            isTransitioning = true;
            showInfoPanel(data);
            controls.enablePan = false;
        }

        function showInfoPanel(data) {
            document.getElementById('panelTitle').textContent = data.name;
            document.getElementById('panelRadius').textContent = data.realRadius;
            document.getElementById('panelOrbit').textContent = data.realPeriod || '-';
            document.getElementById('panelDistance').textContent = data.realDistance;
            document.getElementById('panelDesc').textContent = data.desc;
            
            document.getElementById('infoPanel').classList.add('active');
        }

        function closeInfoPanel() {
            document.getElementById('infoPanel').classList.remove('active');
        }

        function resetView() {
            isFocused = false;
            focusedTarget = null;
            isTransitioning = true;
            
            closeInfoPanel();
            
            // Set targets for reset animation
            targetCameraPosition.set(0, 80, 120);
            targetLookAt.set(0, 0, 0);
            
            controls.enablePan = true;
        }


        function showInfoPanel(data) {
            document.getElementById('panelTitle').textContent = data.name;
            document.getElementById('panelRadius').textContent = data.realRadius;
            document.getElementById('panelOrbit').textContent = data.realPeriod || '-';
            document.getElementById('panelDistance').textContent = data.realDistance;
            document.getElementById('panelDesc').textContent = data.desc;
            
            document.getElementById('infoPanel').classList.add('active');
        }

        function closeInfoPanel() {
            document.getElementById('infoPanel').classList.remove('active');
        }

        function resetView() {
            isFocused = false;
            focusedTarget = null;
            isTransitioning = true;
            
            closeInfoPanel();
            
            // Set targets for reset animation
            targetCameraPosition.set(0, 80, 120);
            targetLookAt.set(0, 0, 0);
            
            controls.enablePan = true;
        }

        function createStarField() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 5000;
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount * 3; i += 3) {
                const radius = 500 + Math.random() * 500;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i + 2] = radius * Math.cos(phi);

                const colorChoice = Math.random();
                if (colorChoice < 0.1) {
                    colors[i] = 1; colors[i + 1] = 0.8; colors[i + 2] = 0.6;
                } else if (colorChoice < 0.2) {
                    colors[i] = 0.8; colors[i + 1] = 0.9; colors[i + 2] = 1;
                } else {
                    colors[i] = 1; colors[i + 1] = 1; colors[i + 2] = 1;
                }
            }

            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const starMaterial = new THREE.PointsMaterial({
                size: 1.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.8
            });

            starField = new THREE.Points(starGeometry, starMaterial);
            scene.add(starField);
        }

        function createSun() {
            const sunGeometry = new THREE.SphereGeometry(5, 64, 64);
            const sunMaterial = new THREE.MeshBasicMaterial({
                color: 0xFDB813,
            });
            sun = new THREE.Mesh(sunGeometry, sunMaterial);
            scene.add(sun);

            const glowGeometry = new THREE.SphereGeometry(6, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xFF6600,
                transparent: true,
                opacity: 0.3
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            sun.add(glow);

            const outerGlowGeometry = new THREE.SphereGeometry(8, 32, 32);
            const outerGlowMaterial = new THREE.MeshBasicMaterial({
                color: 0xFDB813,
                transparent: true,
                opacity: 0.1
            });
            const outerGlow = new THREE.Mesh(outerGlowGeometry, outerGlowMaterial);
            sun.add(outerGlow);

            const sunLight = new THREE.PointLight(0xFFFFFF, 2, 500);
            sunLight.position.set(0, 0, 0);
            scene.add(sunLight);
        }

        function createPlanets() {
            planetData.forEach((data, index) => {
                const orbitGroup = new THREE.Group();
                scene.add(orbitGroup);

                const orbitGeometry = new THREE.RingGeometry(data.distance - 0.1, data.distance + 0.1, 128);
                const orbitMaterial = new THREE.MeshBasicMaterial({
                    color: 0xFFFFFF,
                    transparent: true,
                    opacity: 0.15,
                    side: THREE.DoubleSide
                });
                const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
                orbit.rotation.x = Math.PI / 2;
                orbitGroup.add(orbit);

                const planetGroup = new THREE.Group();
                planetGroup.userData = {
                    angle: Math.random() * Math.PI * 2,
                    orbitPeriod: data.orbitPeriod,
                    rotationSpeed: data.rotationSpeed
                };
                scene.add(planetGroup);

                const planetGeometry = new THREE.SphereGeometry(data.radius, 32, 32);
                const planetMaterial = new THREE.MeshPhongMaterial({
                    color: data.color,
                    shininess: 30
                });
                const planet = new THREE.Mesh(planetGeometry, planetMaterial);
                planetGroup.add(planet);

                if (data.hasRing) {
                    const ringGeometry = new THREE.RingGeometry(data.radius * 1.4, data.radius * 2.2, 64);
                    const ringMaterial = new THREE.MeshBasicMaterial({
                        color: 0xC9B896,
                        transparent: true,
                        opacity: 0.6,
                        side: THREE.DoubleSide
                    });
                    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                    ring.rotation.x = Math.PI / 2.5;
                    planet.add(ring);
                }

                planetGroup.position.x = data.distance;

                planets.push({
                    group: planetGroup,
                    planet: planet,
                    data: data
                });
            });
        }

        function createAmbientLight() {
            const ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;

            if (sun) {
                sun.rotation.y += 0.002;
                const pulse = 1 + Math.sin(time * 2) * 0.05;
                sun.scale.set(pulse, pulse, pulse);
            }

            planets.forEach((planetObj) => {
                const group = planetObj.group;
                const data = planetObj.data;
                const userData = group.userData;

                userData.angle += (Math.PI * 2 / data.orbitPeriod) * 0.01 * speedMultiplier;
                
                group.position.x = Math.cos(userData.angle) * data.distance;
                group.position.z = Math.sin(userData.angle) * data.distance;

                planetObj.planet.rotation.y += data.rotationSpeed * speedMultiplier;
            });

            // Camera transition logic
            if (isFocused && focusedTarget) {
                const targetPos = new THREE.Vector3();
                focusedTarget.getWorldPosition(targetPos);
                
                // Always update controls target to follow the planet
                controls.target.lerp(targetPos, 0.1);
                
                if (isTransitioning) {
                    // Calculate desired camera position relative to target
                    // Maintain current viewing angle but get closer
                    const currentDir = camera.position.clone().sub(controls.target).normalize();
                    
                    let radius = 5; // Default (Sun)
                    if (focusedTarget !== sun) {
                        const pData = planets.find(p => p.planet === focusedTarget);
                        if(pData) radius = pData.data.radius;
                    }
                    
                    const desiredDist = radius * 4 + 5;
                    const desiredPos = targetPos.clone().add(currentDir.multiplyScalar(desiredDist));
                    
                    camera.position.lerp(desiredPos, 0.05);
                    
                    if (camera.position.distanceTo(desiredPos) < 0.5) {
                        isTransitioning = false;
                    }
                }
            } else if (isTransitioning && !isFocused) {
                // Resetting view
                camera.position.lerp(targetCameraPosition, 0.05);
                controls.target.lerp(targetLookAt, 0.05);
                
                if (camera.position.distanceTo(targetCameraPosition) < 1) {
                    isTransitioning = false;
                    controls.enablePan = true;
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
